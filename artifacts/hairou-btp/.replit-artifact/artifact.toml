kind = "web"
previewPath = "/"
title = "HAIROU - Gestion BTP"
version = "1.0.0"
id = "artifacts/hairou-btp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18255

[services.development]
run = "pnpm --filter @workspace/hairou-btp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hairou-btp", "run", "build" ]
publicDir = "artifacts/hairou-btp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18255"
BASE_PATH = "/"
